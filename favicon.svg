<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Špachtle na tmelení -->
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4d4d4"/>
      <stop offset="50%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>
  </defs>
  
  <!-- Čepel špachtle - plochá, široká -->
  <path d="M 15 35 L 70 30 L 70 70 L 15 65 Z" 
        fill="url(#blade)" 
        stroke="#808080" 
        stroke-width="1.5"/>
  
  <!-- Ostří -->
  <line x1="15" y1="35" x2="15" y2="65" stroke="#505050" stroke-width="2"/>
  
  <!-- Rukojeť - plastová -->
  <ellipse cx="80" cy="50" rx="12" ry="20" fill="#2c5f7c" stroke="#1a3a4a" stroke-width="1.5"/>
  
  <!-- Spojení čepele s rukojetí -->
  <path d="M 70 40 Q 75 45 70 50 Q 75 55 70 60" 
        fill="none" 
        stroke="#606060" 
        stroke-width="2"/>
  
  <!-- Detaily na čepeli -->
  <line x1="25" y1="35" x2="25" y2="65" stroke="#a0a0a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="45" y1="33" x2="45" y2="67" stroke="#a0a0a0" stroke-width="0.5" opacity="0.4"/>
</svg>
